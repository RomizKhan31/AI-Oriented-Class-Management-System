<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Class Management | Login</title>
    <!-- Use Outfit font from index.css instead of Inter -->
    <link rel="icon" type="image/jpeg" href="/img/favicon.jpg">
    <link rel="stylesheet" href="/css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(15,23,42,0) 50%);
            animation: rotateBg 20s linear infinite;
            z-index: 0;
        }
        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            z-index: 1;
            position: relative;
        }
        .app-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
            transform: rotate(-10deg);
            transition: transform 0.3s ease;
        }
        .login-card:hover .app-logo {
            transform: rotate(0deg) scale(1.05);
        }
        .app-logo svg {
            color: white;
            width: 32px;
            height: 32px;
        }
        .oauth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .oauth-divider::before,
        .oauth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .oauth-divider::before { margin-right: .5em; }
        .oauth-divider::after { margin-left: .5em; }
        .btn-oauth {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0.8rem;
        }
        .btn-oauth:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-panel login-card animate-fade-in">
            <div class="app-logo">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="nav-brand mb-2" style="justify-content: center; font-size: 2rem;">Smart Class</h1>
            <p class="text-center text-slate mb-4" style="font-size: 0.9rem;">AI-Oriented Academic Management</p>

            <div class="tabs-nav" style="justify-content: center; margin-bottom: 2rem;">
                <button class="tab-btn active" onclick="switchAuthTab('loginTab')">Sign In</button>
                <button class="tab-btn" onclick="switchAuthTab('registerTab')">Register</button>
            </div>

            <div id="loginTab" class="tab-pane active">
                <form id="loginForm">
                    <input type="email" id="email" class="input-glass mb-4" placeholder="Email Address" required>
                    <input type="password" id="password" class="input-glass mb-4" placeholder="Password" required>
                    <button type="submit" class="btn-primary mt-2">Sign In to Dashboard</button>
                </form>
                
                <div class="oauth-divider">OR</div>
                
                <button type="button" class="btn-oauth" onclick="window.location.href='/api/auth/google'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>
                
                <button type="button" class="btn-oauth" onclick="window.location.href='/api/auth/github'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Sign in with GitHub
                </button>
            </div>

            <div id="registerTab" class="tab-pane">
                <form id="registerForm">
                    <input type="text" id="regId" class="input-glass mb-4" placeholder="Custom Student ID (Optional)">
                    <input type="text" id="regName" class="input-glass mb-4" placeholder="Full Name" required>
                    <input type="email" id="regEmail" class="input-glass mb-4" placeholder="Email Address" required>
                    <input type="password" id="regPassword" class="input-glass mb-4" placeholder="Password" required>
                    <button type="submit" class="btn-primary mt-2">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Crisis Widget -->
    <div id="crisis-widget">
        <svg class="pulsing-icon" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 24px; height: 24px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <span id="crisis-message">Crisis Alert System Active</span>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
